{% extends "main/base.html" %}

{% block title %}{{ deck.name }} — готово{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto mt-8">
    <div class="card bg-base-300 shadow-xl">
        <div class="card-body space-y-4">
            <h1 class="card-title text-2xl">Карточек на сейчас нет</h1>
            <p class="opacity-80">Вы повторили все доступные карточки в деке {{ deck.name }}.</p>
            <div class="flex gap-3">
                <a href="{% url 'get_question' deck.id %}" class="btn btn-primary">Проверить снова</a>
                <a href="{% url 'deck_detail' deck.id %}" class="btn btn-ghost">Вернуться к деке</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
